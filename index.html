<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GGapostas — Painel</title>
    <meta name="description" content="Painel de gestão GGapostas" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ── Segurança: impede ser carregado em iframe (anti-clickjacking) ── -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- ── Content Security Policy ── -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <!-- ── Referrer Policy: não vazar URL para terceiros ── -->
    <meta name="referrer" content="no-referrer" />

    <!-- ── Impede detecção de MIME type ── -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- ── Força HTTPS (HSTS via meta — reforço) ── -->
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains" />

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
